name: Validate Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    name: SemVer Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: kwiercioch/semver-claude-plugin/.github/actions/validate-tag@main
        id: tag
        with:
          require-annotated: 'true'
          require-hotfix-marker: 'false'
          allowed-pre-labels: ''

